<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --border: #2a2a30;
    --accent: #c8f040;
    --accent2: #40c8f0;
    --text: #f0ede6;
    --muted: #6b6b75;
    --danger: #f04060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image: radial-gradient(ellipse at 20% 50%, #1a1f0a 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, #0a1a1f 0%, transparent 60%);
  }

  .card {
    width: 100%;
    max-width: 500px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(200,240,64,0.05), 0 30px 60px rgba(0,0,0,0.5);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #1c1c22 0%, #18181c 100%);
  }

  .header-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1.1;
    font-weight: 400;
    color: var(--text);
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .body { padding: 2rem; }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap span {
    position: absolute;
    left: 1rem;
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    padding: 0.75rem 1rem 0.75rem 2.25rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,240,64,0.12);
  }

  .add-charge-toggle {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    background: none;
    border: none;
    padding: 0;
    margin-bottom: 1.25rem;
    transition: opacity 0.2s;
  }
  .add-charge-toggle:hover { opacity: 0.7; }
  .add-charge-toggle svg { transition: transform 0.3s; }
  .add-charge-toggle.open svg { transform: rotate(45deg); }

  .extra-field {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .extra-field.open {
    max-height: 120px;
    opacity: 1;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .results {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.7rem 0;
    border-bottom: 1px dashed var(--border);
    animation: slideIn 0.3s ease both;
  }
  .result-row:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .result-row .rl {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .result-row .rv {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .result-row.state .rv  { color: var(--accent); }
  .result-row.municipal .rv { color: var(--accent2); }
  .result-row.extra .rv  { color: #f0a040; }

  .result-row.total {
    margin-top: 0.5rem;
    padding-top: 1rem;
    border-top: 2px solid var(--accent);
    border-bottom: none;
  }
  .result-row.total .rl {
    font-size: 0.75rem;
    color: var(--text);
    font-weight: 500;
  }
  .result-row.total .rv {
    font-size: 1.5rem;
    color: var(--accent);
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 1rem 0;
  }

  .badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-left: 0.4rem;
    vertical-align: middle;
    font-weight: 400;
  }
  .badge-green { background: rgba(200,240,64,0.12); color: var(--accent); }
  .badge-blue  { background: rgba(64,200,240,0.12); color: var(--accent2); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <p class="header-label">Sales · Tax Calculator</p>
    <h1>Break down your <em>total</em></h1>
  </div>
  <div class="body">

    <div class="field">
      <label>Sale Amount</label>
      <div class="input-wrap">
        <span>$</span>
        <input type="number" id="saleAmount" placeholder="0.00" min="0" step="0.01" oninput="calculate()">
      </div>
    </div>

    <button class="add-charge-toggle" id="toggleBtn" onclick="toggleExtra()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/>
        <line x1="8" y1="5" x2="8" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Add freight, service &amp; handling charges
    </button>

    <div class="extra-field" id="extraField">
      <div class="field">
        <label>Additional Charge <span id="chargeTypeLabel">(freight / service / handling / other)</span></label>
        <div class="input-wrap">
          <span>$</span>
          <input type="number" id="extraCharge" placeholder="0.00" min="0" step="0.01" oninput="calculate()">
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="results" id="results">
      <div class="empty-state">Enter a sale amount to calculate taxes</div>
    </div>

  </div>
</div>

<script>
  let extraOpen = false;

  function toggleExtra() {
    extraOpen = !extraOpen;
    document.getElementById('extraField').classList.toggle('open', extraOpen);
    document.getElementById('toggleBtn').classList.toggle('open', extraOpen);
    if (!extraOpen) {
      document.getElementById('extraCharge').value = '';
      calculate();
    }
  }

  function fmt(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calculate() {
    const sale = parseFloat(document.getElementById('saleAmount').value) || 0;
    const extra = parseFloat(document.getElementById('extraCharge').value) || 0;
    const el = document.getElementById('results');

    if (sale <= 0) {
      el.innerHTML = '<div class="empty-state">Enter a sale amount to calculate taxes</div>';
      return;
    }

    const stateTax = sale * 0.105;
    const munTax   = sale * 0.01;
    const total    = sale + stateTax + munTax + extra;

    let rows = `
      <div class="result-row" style="animation-delay:0.00s">
        <span class="rl">Sale Amount</span>
        <span class="rv">${fmt(sale)}</span>
      </div>
      <div class="result-row state" style="animation-delay:0.05s">
        <span class="rl">State Tax <span class="badge badge-green">10.5%</span></span>
        <span class="rv">${fmt(stateTax)}</span>
      </div>
      <div class="result-row municipal" style="animation-delay:0.10s">
        <span class="rl">Municipal Tax <span class="badge badge-blue">1%</span></span>
        <span class="rv">${fmt(munTax)}</span>
      </div>`;

    if (extra > 0) {
      rows += `
      <div class="result-row extra" style="animation-delay:0.15s">
        <span class="rl">Additional Charges</span>
        <span class="rv">${fmt(extra)}</span>
      </div>`;
    }

    rows += `
      <div class="result-row total" style="animation-delay:${extra > 0 ? '0.20' : '0.15'}s">
        <span class="rl">Grand Total</span>
        <span class="rv">${fmt(total)}</span>
      </div>`;

    el.innerHTML = rows;
  }
</script>
</body>
</html>
